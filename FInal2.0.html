<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Promesa ❤️</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ffafbd, #ffc3a0);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #5d2a42;
        }
        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.6);
            font-size: 20px;
            animation: float 6s linear infinite;
            z-index: 0;
        }
        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
        #game-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 450px;
            width: 90%;
            position: relative;
            z-index: 10;
            border: 3px solid #ff4d6d;
        }

        /* Botón de Música Flotante */
        #music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: #ff4d6d;
            color: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-size: 20px;
        }

        #timer-display {
            font-weight: bold;
            margin-bottom: 15px;
            color: #c9184a;
            background: #fff0f3;
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            border: 1px solid #ffb3c1;
        }
        h2 { color: #ff4d6d; margin: 10px 0; }
        #question-text { font-size: 1.1rem; min-height: 60px; display: flex; align-items: center; justify-content: center; }
        input {
            padding: 12px;
            width: 85%;
            border: 2px solid #ffb3c1;
            border-radius: 15px;
            margin: 15px 0;
            outline: none;
            text-align: center;
            font-size: 1rem;
        }
        button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #c9184a; transform: scale(1.05); }
        .hint-btn { background: #ffccd5; color: #a4133c; font-size: 0.8rem; margin: 5px; padding: 8px 12px; }
        .hint-text { height: 40px; font-style: italic; color: #800f2f; margin-top: 10px; font-size: 0.9rem; }
        .hidden { display: none; }
        .ring-icon { font-size: 70px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>

<div id="heart-bg"></div>

<audio id="bg-music" loop>
    <source src="musica.mp3" type="audio/mpeg">
    Tu navegador no soporta el audio.
</audio>

<div id="music-control" onclick="toggleMusic()">🎵</div>

<div id="game-container">
    <div id="timer-display">⏳ Tiempo: <span id="timer">05:00</span></div>

    <div id="quiz-section">
        <h2 id="step-title">Cargando...</h2>
        <p id="question-text">Preparando tu sorpresa...</p>
        
        <input type="text" id="answer-input" placeholder="Tu respuesta..." autocomplete="off">
        <br>
        <button onclick="checkAnswer()">Confirmar ❤️</button>
        
        <div style="margin-top: 20px; border-top: 1px solid #ffccd5; padding-top: 10px;">
            <button class="hint-btn" onclick="showHint(1)">Pista 1</button>
            <button class="hint-btn" onclick="showHint(2)">Pista 2</button>
            <p id="hint-display" class="hint-text"></p>
        </div>
    </div>

    <div id="final-section" class="hidden">
        <h1>¡Lo Lograste! ❤️</h1>
        <p>Superaste los 12 pasos de nuestra historia.</p>
        <p><b>Ahora, mira a tu lado...</b></p>
        <div class="ring-icon">💍</div>
        <p style="font-weight: bold; color: #ff4d6d; font-size: 1.2rem;">¿Aceptas esta promesa?</p>
    </div>
</div>

<script>
    // TUS PREGUNTAS CORREGIDAS
    const levels = [
        { q: "¿En qué lugar exacto nos vimos por primera vez en persona?", a: "portal de maria", h1: "Empieza por 'P'", h2: "Es cerca a nuestro hogar." },
        { q: "¿Qué película vimos por primera vez en cine?", a: "destino final", h1: "Fue sangrienta.", h2: "Tiene muchas películas similares." },
        { q: "¿Qué día cumplimos meses?", a: "5", h1: "Es la suma de nuestros números favoritos.", h2: "No debería darte pistas para esta pregunta." },
        { q: "¿A qué ciudad queremos ir de luna de miel?", a: "venecia", h1: "Se dice que se está hundiendo...", h2: "Está en el continente de Europa (Italia)." },
        { q: "¿Cómo se va a llamar nuestro hijo?", a: "emmanuel", h1: "Empieza por la letra E.", h2: "Será el primero que nazca." },
        { q: "¿Cuántos hijos vamos a tener?", a: "3", h1: "Si respondiste mal, vuelve a intentarlo.", h2: "Recuerda que es mi número favorito." },
        { q: "¿Qué día de la semana nos hicimos novios oficialmente?", a: "jueves", h1: "No fue un lunes aburrido.", h2: "Es el cuarto día de la semana." },
        { q: "¿Cuál fue el primer restaurante al que fuimos a comer?", a: "mocaty", h1: "Es cerca al Éxito.", h2: "Hace mucho no vamos." },
        { q: "¿Qué canción identifica nuestro amor?", a: "un desperdicio", h1: "Es de Rels B.", h2: "Fuimos a su concierto." },
        { q: "¿Cuál es nuestro restaurante favorito?", a: "crepes and waffles", h1: "Vamos casi siempre que estamos en Bogotá.", h2: "Tiene un gran menú con cosas dulces y saladas." },
        { q: "Cuando fuimos a pintar... ¿qué se me olvidó?", a: "pinturas", h1: "Era lo más importante para la actividad.", h2: "Se quedaron olvidadas en la cama." },
        { q: "Esta no es una pregunta, es una promesa. ¿Cuál es la palabra que define lo que quiero construir contigo?", a: "hogar", h1: "Es lo que más deseamos juntos.", h2: "En teoría ya lo tenemos porque somos un..." }
    ];

    let currentLevel = 0;
    let timeLeft = 300; 
    let timerInterval;

    function updateLevel() {
        document.getElementById('step-title').innerText = "Paso " + (currentLevel + 1);
        document.getElementById('question-text').innerText = levels[currentLevel].q;
        document.getElementById('answer-input').value = "";
        document.getElementById('hint-display').innerText = "";
    }

    function checkAnswer() {
        const input = document.getElementById('answer-input').value.toLowerCase().trim();
        if (input === levels[currentLevel].a.toLowerCase()) {
            currentLevel++;
            if (currentLevel < levels.length) {
                updateLevel();
            } else {
                showFinal();
            }
        } else {
            alert("¡Inténtalo de nuevo, mi vida! Tú puedes.");
        }
    }

    function showHint(num) {
        const display = document.getElementById('hint-display');
        display.innerText = (num === 1) ? levels[currentLevel].h1 : levels[currentLevel].h2;
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                alert("¡Se acabó el tiempo! Pero el amor sigue. Reiniciando...");
                location.reload();
            } else {
                timeLeft--;
                let min = Math.floor(timeLeft / 60);
                let sec = timeLeft % 60;
                document.getElementById('timer').innerText = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
            }
        }, 1000);
    }

    function showFinal() {
        clearInterval(timerInterval);
        document.getElementById('quiz-section').classList.add('hidden');
        document.getElementById('timer-display').classList.add('hidden');
        document.getElementById('final-section').classList.remove('hidden');
    }

    function toggleMusic() {
        const audio = document.getElementById('bg-music');
        const btn = document.getElementById('music-control');
        if (audio.paused) {
            audio.play();
            btn.innerText = "⏸️";
        } else {
            audio.pause();
            btn.innerText = "🎵";
        }
    }

    function createHearts() {
        const bg = document.getElementById('heart-bg');
        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerText = '❤';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.animationDuration = (Math.random() * 2 + 4) + 's';
            bg.appendChild(h);
            setTimeout(() => h.remove(), 6000);
        }, 500);
    }

    window.onload = () => {
        updateLevel();
        startTimer();
        createHearts();
    };
</script>
</body>
</html>
